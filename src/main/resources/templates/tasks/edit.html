<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header}"></head>

<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Редактировать задачу</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/tasks/edit/{id}(id=${task.id})}" th:object="${task}" method="post">
        <div class="mb-3">
            <label for="title" class="form-label">Название</label>
            <input type="text" class="form-control" id="title" th:field="*{title}" required>
        </div>

        <div class="mb-3">
            <label for="priority" class="form-label">Приоритет</label>
            <select class="form-select" id="priority" th:field="*{priority.id}" required>
                <option th:each="priority : ${priorities}"
                        th:value="${priority.id}"
                        th:text="${priority.name}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="5"></textarea>
        </div>

        <a th:href="@{/tasks/{id}(id=${task.id})}" class="btn btn-secondary">Отмена</a>

        <button type="submit" class="btn btn-primary">Сохранить</button>
    </form>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
