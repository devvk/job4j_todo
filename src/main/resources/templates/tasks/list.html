<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header}"></head>

<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Todo List</h1>
        <a class="btn btn-primary" href="/tasks/create">Добавить задание</a>
    </div>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-light">
        <tr>
            <th>Описание</th>
            <th>Дата создания</th>
            <th>Состояние</th>
            <th>Приоритет</th>
            <th>Категория</th>
            <th>Автор</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td>
                <a th:href="@{/tasks/{id}(id=${task.id})}" th:text="${task.title}"></a>
            </td>
            <td th:text="${@timezoneService.format(task.created, session.user.zoneId)}"></td>
            <td>
                <span th:if="${task.done}" class="badge text-bg-success">Выполнена</span>
                <span th:unless="${task.done}" class="badge text-bg-warning">Новая</span>
            </td>
            <td>
                <span th:if="${task.priority != null}"
                      class="badge text-bg-info"
                      th:text="${task.priority.name}">Приоритет</span>
                <span th:if="${task.priority == null}" class="badge text-bg-secondary">-</span>
            </td>
            <td>
                <span th:each="category : ${task.categories}"
                      class="badge text-bg-secondary me-1"
                      th:text="${category.name}">
                </span>
                <span th:if="${task.categories == null || task.categories.isEmpty()}" class="text-muted">-</span>
            </td>
            <td th:text="${task.user != null ? task.user.login : '-'}"></td>
        </tr>
        </tbody>
    </table>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
