<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header}"></head>

<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<div class="container mt-4">
    <h1 class="mb-4">Создать задачу</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/tasks/create}" th:object="${task}" method="post">
        <div class="mb-3">
            <label for="title" class="form-label">Название</label>
            <input type="text" class="form-control" id="title" th:field="*{title}" required>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Описание</label>
            <textarea class="form-control" id="description" th:field="*{description}" rows="5"></textarea>
        </div>

        <a href="/tasks" class="btn btn-secondary">Отмена</a>
        <button type="submit" class="btn btn-primary">Создать</button>
    </form>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
