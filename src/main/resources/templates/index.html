<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>TODO list</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>TODO list</h1>
        <a class="btn btn-primary" href="/tasks/create">Добавить задание</a>
    </div>

    <div class="mb-3">
        <a class="btn btn-outline-secondary" href="/tasks">Все</a>
        <a class="btn btn-outline-success" href="/tasks/done">Выполненные</a>
        <a class="btn btn-outline-warning" href="/tasks/new">Новые</a>
    </div>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-light">
        <tr>
            <th>Описание</th>
            <th>Дата создания</th>
            <th>Состояние</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="task : ${tasks}">
            <td>
                <a th:href="@{/tasks/{id}(id=${task.id})}" th:text="${task.description}"></a>
            </td>
            <td th:text="${task.created}"></td>
            <td>
                <span th:if="${task.done}" class="badge text-bg-success">Выполнено</span>
                <span th:unless="${task.done}" class="badge text-bg-warning">Новое</span>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
