<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/header :: header}"></head>

<body>

<div th:replace="~{fragments/navigation :: navigation}"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h1 class="mb-4">Регистрация</h1>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/users/register}" th:object="${user}" method="post">

                <div class="mb-3">
                    <label for="name" class="form-label">Имя</label>
                    <input type="text"
                           class="form-control"
                           id="name"
                           th:field="*{name}"
                           required>
                </div>

                <div class="mb-3">
                    <label for="login" class="form-label">Логин</label>
                    <input type="text"
                           class="form-control"
                           id="login"
                           th:field="*{login}"
                           required>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password"
                           class="form-control"
                           id="password"
                           th:field="*{password}"
                           required>
                </div>

                <div class="mb-3">
                    <label for="zoneId" class="form-label">Часовой пояс</label>
                    <select class="form-select" id="zoneId" th:field="*{zoneId}">
                        <option th:each="zone : ${zones}"
                                th:value="${zone}"
                                th:text="${zone}">
                    </select>
                </div>

                <a href="/users/login" class="btn btn-secondary">
                    Отмена
                </a>

                <button type="submit" class="btn btn-primary">
                    Зарегистрироваться
                </button>

            </form>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

</body>
</html>
